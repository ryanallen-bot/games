<!DOCTYPE html>
<html>
<head>
  <base target="_blank">
  <title>Google Game Loader</title>
  <style>
    .play-button {
      display: inline-block;
      padding: 20px 40px;
      background-color: #000000;
      color: #ffffff !important;
      border: 2px solid #4a148c;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none !important;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1001;
    }

    .play-button:hover {
      background-color: #4a148c !important;
      transform: translate(-50%, -50%) scale(1.05);
    }

    .fullscreen-button {
      display: inline-block;
      padding: 10px 15px;
      background-color: #000000;
      color: #ffffff !important;
      border: 2px solid #4a148c;
      border-radius: 5px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none !important;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1002;
    }

    .fullscreen-button:hover {
      background-color: #4a148c !important;
      transform: scale(1.05);
    }

    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="container">
    <iframe id="fr" width="100%" height="100%" frameborder="0" allowfullscreen=""></iframe>
    <button class="play-button" type="button" onclick="PlayTo(this)">CLICK TO PLAY</button>
    <p id="unblocked-text">G+</p>
    <button class="fullscreen-button" type="button" onclick="openFullscreen()">FULLSCREEN</button>
  </div>

  <script>
    const DB_NAME = 'GameCacheDB';
    const STORE_NAME = 'GameFiles';
    const CACHE_DURATION = 90 * 24 * 60 * 60 * 1000;
    const FILE_URL = 'https://cdn.jsdelivr.net/gh/docs-g-classroommyflies/yes@main/google.com-7.xml';

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          db.createObjectStore(STORE_NAME, { keyPath: 'url' });
        };
        request.onsuccess = (event) => resolve(event.target.result);
        request.onerror = (event) => reject(event.target.error);
      });
    }

    async function saveToCache(url, content) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_NAME, 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.put({ url: url, content: content, timestamp: Date.now() });
        request.onsuccess = () => resolve();
        request.onerror = () => reject(new Error('Failed to cache file'));
      });
    }

    async function getFileFromCache(url) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_NAME, 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.get(url);

        request.onsuccess = async (event) => {
          const data = event.target.result;
          if (data && (Date.now() - data.timestamp) < CACHE_DURATION) {
            resolve(data.content);
          } else {
            try {
              const response = await fetch(url);
              const text = await response.text();
              await saveToCache(url, text);
              resolve(text);
            } catch (err) {
              reject(err);
            }
          }
        };
        request.onerror = (event) => reject(event.target.error);
      });
    }

    function PlayTo(button) {
      const iframe = document.getElementById("fr");
      getFileFromCache(FILE_URL).then((text) => {
        iframe.contentDocument.open();
        iframe.contentDocument.write(text);
        iframe.contentDocument.close();
        iframe.style.display = "block";
        button.style.display = "none";
      }).catch((err) => {
        console.error('Error loading game:', err);
        alert('Could not load game. Check your connection.');
      });
    }

    function openFullscreen() {
      getFileFromCache(FILE_URL).then((text) => {
        const newWindow = window.open("", "_blank");
        if (newWindow) {
          newWindow.document.open();
          newWindow.document.write(`
            <!DOCTYPE html>
            <html><head><style>body,html{margin:0;padding:0;overflow:hidden;height:100%;width:100%;}</style></head>
            <body>${text}</body></html>
          `);
          newWindow.document.close();
        } else {
          alert('Could not open fullscreen window. Allow popups.');
        }
      }).catch((err) => {
        console.error('Error opening fullscreen:', err);
        alert('Fullscreen failed. Check your internet.');
      });
    }
  </script>
</body>
</html>
